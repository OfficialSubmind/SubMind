<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SubMind — Deep Intelligence Research</title>
<meta name="description" content="SubMind: Autonomous deep research engine. Verified intelligence briefings with traced sources."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0a0b;--surface:#111113;--border:rgba(255,255,255,.06);--text:#e4e4e7;
--text2:#a1a1aa;--text3:#52525b;--accent:#7c5cfc;--accent2:#a78bfa;--green:#34d399;
--red:#f87171;--orange:#fbbf24;--blue:#60a5fa;--panel:#16161a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;
-webkit-font-smoothing:antialiased;line-height:1.6}
::selection{background:rgba(124,92,252,.3)}

/* ── LAYOUT ───────────────────────── */
.container{max-width:820px;margin:0 auto;padding:24px 20px}

/* ── HEADER ───────────────────────── */
.header{padding:32px 0 24px;border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.brand-mark{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#7c5cfc,#a78bfa);
display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff}
.brand-name{font-size:17px;font-weight:600;letter-spacing:-.02em}
.brand-tag{font-size:11px;color:var(--text3);letter-spacing:.02em}

/* ── SEARCH ───────────────────────── */
.search-section{padding:28px 0}
.search-box{position:relative}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;
padding:16px 120px 16px 18px;color:var(--text);font-family:'Inter',sans-serif;font-size:15px;
outline:none;transition:border-color .2s}
.search-input:focus{border-color:rgba(124,92,252,.4)}
.search-input::placeholder{color:var(--text3)}
.search-btn{position:absolute;right:6px;top:6px;bottom:6px;padding:0 20px;
background:linear-gradient(135deg,#7c5cfc,#6d4de8);color:#fff;border:none;border-radius:8px;
font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;
transition:opacity .2s}
.search-btn:hover{opacity:.9}
.search-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── LOADING ──────────────────────── */
.loading{display:none;padding:48px 0;text-align:center}
.loading.active{display:block}
.loading-spinner{width:32px;height:32px;border:2.5px solid var(--border);border-top-color:var(--accent);
border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--text3)}

/* ── RESULTS ──────────────────────── */
.results{display:none}
.results.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── BRIEFING HEADER ──────────────── */
.brief-header{padding:28px 0 20px;border-bottom:1px solid var(--border)}
.brief-title{font-size:22px;font-weight:700;letter-spacing:-.03em;line-height:1.3;margin-bottom:10px}
.brief-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brief-badge{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;
padding:3px 10px;border-radius:5px;letter-spacing:.03em}
.badge-confirmed{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.badge-probable{background:rgba(251,191,36,.1);color:var(--orange);border:1px solid rgba(251,191,36,.2)}
.badge-developing{background:rgba(96,165,250,.1);color:var(--blue);border:1px solid rgba(96,165,250,.2)}
.badge-disputed{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.meta-item{font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace}

/* ── ORIGIN EVENT ─────────────────── */
.origin-box{margin:20px 0;padding:16px 18px;border-radius:10px;border:1px solid rgba(124,92,252,.12);
background:rgba(124,92,252,.03)}
.origin-label{font-size:10px;font-weight:600;color:var(--accent);letter-spacing:.1em;
text-transform:uppercase;margin-bottom:6px;font-family:'JetBrains Mono',monospace}
.origin-event{font-size:14px;font-weight:500;margin-bottom:3px}
.origin-detail{font-size:12px;color:var(--text2)}

/* ── EXECUTIVE SUMMARY ────────────── */
.exec-summary{padding:20px 0;font-size:15px;line-height:1.75;color:var(--text);
border-bottom:1px solid var(--border)}

/* ── MAIN BRIEFING ────────────────── */
.briefing{padding:24px 0;font-size:14.5px;line-height:1.8;color:var(--text2)}
.briefing p{margin-bottom:16px}
.briefing a.citation{color:var(--accent2);text-decoration:none;font-size:12px;
font-family:'JetBrains Mono',monospace;vertical-align:super;cursor:pointer;
transition:color .15s}
.briefing a.citation:hover{color:var(--accent);text-decoration:underline}

/* ── TIMELINE ─────────────────────── */
.timeline-section{padding:24px 0;border-top:1px solid var(--border)}
.section-title{font-size:13px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
color:var(--text3);margin-bottom:16px}
.tl-item{display:flex;gap:14px;padding:8px 0}
.tl-dot{width:8px;height:8px;border-radius:50%;margin-top:7px;flex-shrink:0}
.tl-dot.verified{background:var(--green)}
.tl-dot.predicted{background:var(--accent);opacity:.7}
.tl-date{font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace;
min-width:90px;flex-shrink:0}
.tl-event{font-size:13px;color:var(--text2)}

/* ── PREDICTIONS ──────────────────── */
.predictions-section{padding:24px 0;border-top:1px solid var(--border)}
.pred-card{padding:14px 0;border-bottom:1px solid var(--border)}
.pred-card:last-child{border-bottom:none}
.pred-scenario{font-size:14px;font-weight:500;margin-bottom:4px}
.pred-meta{display:flex;gap:16px;font-size:12px;color:var(--text3);
font-family:'JetBrains Mono',monospace}
.pred-prob{font-weight:600}

/* ── SOURCES ──────────────────────── */
.sources-section{padding:24px 0;border-top:1px solid var(--border)}
.source-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.source-item:last-child{border-bottom:none}
.source-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent2);
min-width:24px;padding-top:2px}
.source-info{flex:1;min-width:0}
.source-title{font-size:13px;font-weight:500;color:var(--blue);cursor:pointer;
text-decoration:none;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.source-title:hover{text-decoration:underline}
.source-domain{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:1px}

/* ── METHODOLOGY ──────────────────── */
.methodology{padding:20px 0;border-top:1px solid var(--border);font-size:12px;
color:var(--text3);line-height:1.7}

/* ── RESPONSIVE ───────────────────── */
@media(max-width:640px){
.container{padding:16px 14px}
.brief-title{font-size:18px}
.brief-meta{gap:8px}
.search-input{padding-right:100px;font-size:14px}
}
</style>
</head>
<body>
<div class="container">

<header class="header">
  <div class="brand">
    <div class="brand-mark">S</div>
    <span class="brand-name">SubMind</span>
  </div>
  <div class="brand-tag">Deep Intelligence Research Engine</div>
</header>

<section class="search-section">
  <div class="search-box">
    <input class="search-input" id="searchInput" type="text"
      placeholder="Enter any topic, event, or claim to research..."
      autocomplete="off"/>
    <button class="search-btn" id="searchBtn" onclick="runSearch()">Research</button>
  </div>
</section>

<div class="loading" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">Gathering sources and building intelligence briefing...</div>
</div>

<div class="results" id="results">
  <div class="brief-header">
    <h1 class="brief-title" id="briefTitle"></h1>
    <div class="brief-meta">
      <span class="brief-badge" id="briefBadge"></span>
      <span class="meta-item" id="briefConf"></span>
      <span class="meta-item" id="briefSources"></span>
      <span class="meta-item" id="briefTime"></span>
    </div>
  </div>

  <div class="origin-box" id="originBox" style="display:none">
    <div class="origin-label">Origin Event</div>
    <div class="origin-event" id="originEvent"></div>
    <div class="origin-detail" id="originDetail"></div>
  </div>

  <div class="exec-summary" id="execSummary"></div>

  <div class="briefing" id="briefingContent"></div>

  <div class="timeline-section" id="timelineSection" style="display:none">
    <div class="section-title">Timeline</div>
    <div id="timelineItems"></div>
  </div>

  <div class="predictions-section" id="predictionsSection" style="display:none">
    <div class="section-title">Forward Assessment</div>
    <div id="predictionItems"></div>
  </div>

  <div class="sources-section" id="sourcesSection" style="display:none">
    <div class="section-title">Sources</div>
    <div id="sourceItems"></div>
  </div>

  <div class="methodology" id="methodology"></div>
</div>

</div>
<script>
async function runSearch() {
  const topic = document.getElementById('searchInput').value.trim();
  if (!topic) return;
  
  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.textContent = 'Researching...';
  document.getElementById('results').classList.remove('active');
  document.getElementById('loading').classList.add('active');
  
  try {
    const resp = await fetch('/api/predict', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ topic })
    });
    
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || err.detail || 'Research failed');
    }
    
    const data = await resp.json();
    renderBriefing(data);
    
    document.getElementById('loading').classList.remove('active');
    document.getElementById('results').classList.add('active');
    
  } catch (err) {
    document.getElementById('loading').classList.remove('active');
    alert('SubMind Error: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Research';
  }
}

function renderBriefing(d) {
  // Title
  document.getElementById('briefTitle').textContent = d.title || d.topic;
  
  // Classification badge
  const badge = document.getElementById('briefBadge');
  const cls = (d.classification || 'DEVELOPING').toUpperCase();
  badge.textContent = cls;
  badge.className = 'brief-badge badge-' + cls.toLowerCase();
  
  // Meta
  const conf = d.confidence || d.validation?.adjustedConfidence || 0.5;
  document.getElementById('briefConf').textContent = (conf * 100).toFixed(0) + '% confidence';
  document.getElementById('briefSources').textContent = (d.sourceCount || d.sources?.length || 0) + ' sources';
  document.getElementById('briefTime').textContent = ((d.processingMs || 0) / 1000).toFixed(1) + 's';
  
  // Origin event
  const origin = d.origin;
  if (origin && origin.event) {
    document.getElementById('originBox').style.display = '';
    document.getElementById('originEvent').textContent = origin.event;
    const details = [origin.date, origin.location].filter(Boolean).join(' — ');
    document.getElementById('originDetail').textContent = details + (origin.significance ? '. ' + origin.significance : '');
  } else {
    document.getElementById('originBox').style.display = 'none';
  }
  
  // Executive summary
  document.getElementById('execSummary').textContent = d.summary || '';
  
  // Main briefing — convert [1] citations to clickable links
  let briefText = d.briefing || '';
  // Convert citation numbers to anchor links
  briefText = briefText.replace(/\[(\d+)\]/g, function(match, num) {
    const src = (d.sources || [])[parseInt(num) - 1];
    if (src && src.url) {
      return '<a class="citation" href="' + src.url + '" target="_blank" rel="noopener" title="' + 
        (src.title || 'Source ' + num).replace(/"/g, '') + '">[' + num + ']</a>';
    }
    return '<span class="citation" style="color:var(--text3)">[' + num + ']</span>';
  });
  // Convert paragraphs
  briefText = briefText.split(/\n\n+/).map(p => '<p>' + p.trim() + '</p>').join('');
  document.getElementById('briefingContent').innerHTML = briefText;
  
  // Timeline
  const tl = d.timeline || [];
  if (tl.length > 0) {
    document.getElementById('timelineSection').style.display = '';
    document.getElementById('timelineItems').innerHTML = tl.map(t => 
      '<div class="tl-item">' +
        '<div class="tl-dot ' + (t.verified === false ? 'predicted' : 'verified') + '"></div>' +
        '<div class="tl-date">' + (t.date || '') + '</div>' +
        '<div class="tl-event">' + (t.event || '') + '</div>' +
      '</div>'
    ).join('');
  } else {
    document.getElementById('timelineSection').style.display = 'none';
  }
  
  // Predictions
  const preds = d.predictions || [];
  if (preds.length > 0) {
    document.getElementById('predictionsSection').style.display = '';
    document.getElementById('predictionItems').innerHTML = preds.map(p => {
      const prob = p.probability || 0.5;
      const color = prob >= 0.7 ? 'var(--green)' : prob >= 0.4 ? 'var(--orange)' : 'var(--red)';
      return '<div class="pred-card">' +
        '<div class="pred-scenario">' + (p.scenario || '') + '</div>' +
        '<div class="pred-meta">' +
          '<span class="pred-prob" style="color:' + color + '">' + (prob * 100).toFixed(0) + '%</span>' +
          (p.timeframe ? '<span>' + p.timeframe + '</span>' : '') +
        '</div>' +
        (p.basis ? '<div style="font-size:12px;color:var(--text3);margin-top:4px">' + p.basis + '</div>' : '') +
      '</div>';
    }).join('');
  } else {
    document.getElementById('predictionsSection').style.display = 'none';
  }
  
  // Sources
  const sources = d.sources || [];
  if (sources.length > 0) {
    document.getElementById('sourcesSection').style.display = '';
    document.getElementById('sourceItems').innerHTML = sources.map(s =>
      '<div class="source-item">' +
        '<div class="source-num">[' + s.index + ']</div>' +
        '<div class="source-info">' +
          '<a class="source-title" href="' + (s.url || '#') + '" target="_blank" rel="noopener">' + 
            (s.title || 'Source ' + s.index) + '</a>' +
          '<div class="source-domain">' + (s.domain || '') + '</div>' +
        '</div>' +
      '</div>'
    ).join('');
  } else {
    document.getElementById('sourcesSection').style.display = 'none';
  }
  
  // Methodology
  const methParts = [];
  if (d.methodology_note) methParts.push(d.methodology_note);
  if (d.validation) {
    const v = d.validation;
    if (v.highAuthoritySources > 0) methParts.push(v.highAuthoritySources + ' high-authority sources verified.');
    if (v.glassFangIssues > 0) methParts.push('Internal validation flagged ' + v.glassFangIssues + ' items for review; confidence adjusted accordingly.');
  }
  methParts.push('Analysis by SubMind v6.0. Provider: ' + (d.provider || 'auto') + '.');
  document.getElementById('methodology').textContent = methParts.join(' ');
}

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runSearch();
  if (e.key === 'Enter' && document.activeElement.id === 'searchInput') runSearch();
});
</script>
</body>
  </html>
